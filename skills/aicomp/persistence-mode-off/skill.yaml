apiVersion: skill/v0.1
kind: Diagnostic
metadata:
  id: aicomp.gpu.persistence-mode-off
  name: GPU 持久化模式未开排查
  taxonomy: aicomp/gpu/persistence-mode-off
  version: 0.1.0
  maturity: sim_verified
  platforms:
  - os: linux
  authors:
  - opsagent-core
  license: Apache-2.0
  provenance:
    generated_by: claude-opus-4-8
    reviewed_by:
    - claude-fable-5
  expires_review: '2027-07-01'
requirements:
  capability_level: read
  connectors:
  - ssh
  facts:
  - os.family
  - gpu.driver.version
tree:
  entry: check_pm
  nodes:
  - id: check_pm
    type: check
    title: 查持久化模式是否开启
    run:
      linux: nvidia-smi --query-gpu=persistence_mode --format=csv,noheader 2>/dev/null
        | grep -ic 'Disabled'
    parser: generic/count-v1
    branch:
    - when: output.value > 0
      goto: check_daemon
    - when: output.value == 0
      goto: done_pm_on
    otherwise: check_daemon
    cautions:
    - 持久化模式关闭时,没有进程用 GPU 内核就会卸载驱动状态,下次用又重新初始化——表现为首次CUDA 调用/nvidia-smi 有明显延迟;训练/推理集群应常开持久化模式
  - id: check_daemon
    type: check
    title: 看是否运行 nvidia-persistenced 守护
    run:
      linux: systemctl is-active nvidia-persistenced 2>/dev/null | grep -ic '^active'
    parser: generic/count-v1
    branch:
    - when: output.value > 0
      goto: done_daemon_on
    - when: output.value == 0
      goto: done_enable_pm
    otherwise: escalate
    cautions:
    - 老的 nvidia-smi -pm 1 方式已弃用,推荐用 nvidia-persistenced 守护进程维持持久化;两者目的一致——让驱动常驻,避免反复初始化开销
  - id: done_pm_on
    type: done
    summary: 持久化模式已开。首次慢另查(CUDA context 初始化、MIG、cgroup 限制、大模型加载)。
  - id: done_enable_pm
    type: done
    summary: 持久化模式关且无守护进程。启用 nvidia-persistenced 并设开机自启,让驱动常驻;消除首次调用/nvidia-smi 的初始化延迟,适合常驻的训练推理节点。
  - id: done_daemon_on
    type: done
    summary: 有守护进程但持久化仍显示关,核对 nvidia-persistenced 是否真生效/版本兼容、是否被其它配置覆盖;必要时重启该服务并复查
      persistence_mode。
  - id: escalate
    type: escalate
    summary: 打包升级：已采集的事实与走过的路径。
tests:
- scenario: aicomp-gpu-persistence-mode-off-auto
  expect_path:
  - check_pm
  - check_daemon
  - done_daemon_on
feedback:
  ask: GPU 持久化模式未开排查定位了吗？
