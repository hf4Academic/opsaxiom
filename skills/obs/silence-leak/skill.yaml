apiVersion: skill/v0.1
kind: Diagnostic
metadata:
  id: obs.alerting.silence-leak
  name: 告警静默泄漏排查(该响的没响)
  taxonomy: obs/alerting/silence-leak
  version: 0.1.0
  maturity: sim_verified
  platforms:
  - os: linux
  authors:
  - opsagent-core
  license: Apache-2.0
  provenance:
    generated_by: claude-opus-4-8
    reviewed_by:
    - claude-fable-5
  expires_review: '2027-07-01'
requirements:
  capability_level: read
  connectors:
  - ssh
  facts:
  - os.family
tree:
  entry: check_silences
  nodes:
  - id: check_silences
    type: check
    title: 查生效中的静默规则数
    run:
      linux: curl -s 'localhost:9093/api/v2/silences' 2>/dev/null | grep -oE '"state":"active"'
        | wc -l
    parser: generic/count-v1
    branch:
    - when: output.value > 0
      goto: check_expiry
    - when: output.value == 0
      goto: done_no_silence
    otherwise: check_expiry
    cautions:
    - 运维临时静默(如维护窗口)后忘了删，是'该响的没响'的头号原因——静默应设明确过期时间而非永久
  - id: check_expiry
    type: check
    title: 看是否有长期/永久静默
    run:
      linux: curl -s 'localhost:9093/api/v2/silences' 2>/dev/null | grep -icE '"endsAt":"(20[3-9][0-9]|2[1-9])'
    parser: generic/count-v1
    branch:
    - when: output.value > 0
      goto: done_long_silence
    - when: output.value == 0
      goto: done_check_match
    otherwise: escalate
    cautions:
    - 静默的 matcher 写太宽(如只匹配 severity=warning)会误伤大量本该告警的项——看 matcher 覆盖范围是否超出预期
  - id: done_no_silence
    type: done
    summary: 无生效静默。该告警的没响另查(告警规则/路由/接收器配置)。
  - id: done_long_silence
    type: done
    summary: 存在长期/永久静默，可能是维护后忘删。核对每条静默的创建人与理由，过期的删除；建立静默审计习惯(设过期时间、定期清理)。
  - id: done_check_match
    type: done
    summary: 有静默但非长期。检查其 matcher 是否写太宽误伤了本该告警的项，收窄 matcher 范围。
  - id: escalate
    type: escalate
    summary: 打包升级：已采集的事实与走过的路径。
tests:
- scenario: obs-alerting-silence-leak-auto
  expect_path:
  - check_silences
  - check_expiry
  - done_long_silence
feedback:
  ask: 告警静默泄漏排查(该响的没响)定位了吗？
