apiVersion: skill/v0.1
kind: Diagnostic
metadata:
  id: middleware.kafka.consumer-lag
  name: Kafka 消费积压排查
  taxonomy: middleware/kafka/consumer-lag
  version: 0.1.0
  maturity: sim_verified
  platforms:
  - os: linux
  authors:
  - opsagent-core
  license: Apache-2.0
  provenance:
    generated_by: claude-opus-4-8
    reviewed_by:
    - claude-fable-5
  params:
  - name: group
    source: alert
    desc: 消费组名
  expires_review: '2027-07-01'
requirements:
  capability_level: read
  connectors:
  - ssh
  facts:
  - os.family
tree:
  entry: check_lag
  nodes:
  - id: check_lag
    type: check
    title: 查消费组总 lag
    run:
      linux: kafka-consumer-groups.sh --bootstrap-server localhost:9092 --describe
        --group {{group}} 2>/dev/null | awk 'NR>1{s+=$6} END{print s+0}'
    parser: generic/count-v1
    branch:
    - when: output.value > 10000
      goto: check_state
    - when: output.value <= 10000
      goto: done_lag_ok
    otherwise: check_state
    cautions:
    - lag 大要看是持续增长还是稳定——稳定的固定 lag(如批处理)无害，持续涨才是消费跟不上
  - id: check_state
    type: check
    title: 查消费组状态是否稳定
    run:
      linux: kafka-consumer-groups.sh --bootstrap-server localhost:9092 --describe
        --group {{group}} --state 2>/dev/null | grep -ic 'Stable'
    parser: generic/count-v1
    branch:
    - when: output.value > 0
      goto: done_slow_consumer
    - when: output.value == 0
      goto: done_rebalancing
    otherwise: escalate
    cautions:
    - 消费并行度上限=分区数，消费者多于分区也没用；lag 大且组稳定=消费处理慢或分区不够
  - id: done_lag_ok
    type: done
    summary: lag 不大，消费正常。若业务觉得慢查端到端时延而非积压。
  - id: done_slow_consumer
    type: done
    summary: 组稳定但 lag 涨=消费处理慢或分区不足。优化消费逻辑、加消费者实例(不超过分区数)、或增加分区数提升并行度。
  - id: done_rebalancing
    type: done
    summary: 消费组不稳定(在 rebalance)。频繁 rebalance 会让消费停滞——查是否消费者频繁加入退出、max.poll.interval
      超时被踢、心跳配置。
  - id: escalate
    type: escalate
    summary: 打包升级：已采集的事实与走过的路径。
tests:
- scenario: middleware-kafka-consumer-lag-auto
  expect_path:
  - check_lag
  - check_state
  - done_slow_consumer
feedback:
  ask: Kafka 消费积压排查定位了吗？
