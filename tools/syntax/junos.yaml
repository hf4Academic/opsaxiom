# Juniper Junos 合法命令前缀树。Junos 用 show ...（复数 interfaces）、clear bgp neighbor、
# show configuration，与 Cisco/华为均不同。
platform: junos
kind: network
prefixes:
  - show bgp summary
  - show bgp neighbor
  - show bgp
  - show route
  - show interfaces
  - show configuration
  - show log
  - show ospf neighbor
  - show ethernet-switching table
  - show spanning-tree
  - show version
  - ping
  - traceroute
  - clear bgp neighbor
  - clear bgp
  - show vlans
  - show interfaces diagnostics optics
  - show arp
  - show interfaces terse
  - show firewall
