# 解析器字段契约（Q-2）——声明每个解析器的输出字段，供校验器检查 when/assert 引用是否真有来源。
# 结构：<parser-name>: {rows:[行字段], scalars:[顶层标量], lists:{名:[]}, lines:bool}
# 已在代码中带声明注册的解析器（health.py/table.py）以代码为准；此文件覆盖尚未实现的契约。
# lists 的空 subfields 表示"允许任意子字段"（WARN 阶段从宽）。
parsers:
  # ---- host: table/* ----
  table/free-v1: {scalars: [available_pct, mem_total, slab_unreclaim_mb]}
  table/vmstat-v1: {rows: [r, si, so, sy, us, wa]}
  table/ps-v1: {rows: [pcpu, pid, comm]}
  table/ps-rss-v1: {rows: [rss, pid, comm], scalars: [mem_total]}
  table/ps-stat-v1: {rows: [stat, ppid, pid, comm, count]}
  table/iostat-v1: {rows: [util, await, aqu_sz]}
  table/iotop-v1: {rows: [io_pct, pid, comm]}
  table/mpstat-v1: {rows: [steal, us, sy, wa]}
  table/fd-rank-v1: {rows: [fd_count, pid, comm]}
  table/ss-states-v1: {scalars: [timewait]}
  table/ss-summary-v1: {scalars: [timewait]}
  # ---- host: json/* ----
  json/file-nr-v1: {scalars: [allocated, max]}
  # ---- host: text/* （诊断类只用 lines[] matches + count(lines)）----
  text/dmesg-oom-v1: {lines: true}
  text/dmesg-fs-v1: {lines: true}
  text/dmesg-lockup-v1: {lines: true}
  text/journal-v1: {lines: true}
  text/systemctl-status-v1: {lines: true}
  text/resolv-v1: {lines: true}
  text/timedatectl-v1: {lines: true}
  text/mdstat-v1: {lines: true}
  text/x509-v1: {scalars: [days_left], lines: true}
  # ---- k8s ----
  json/k8s-deploy-status-v1: {scalars: [updated_replicas, ready_replicas, spec_replicas, available_replicas]}
  json/k8s-container-state-v1: {scalars: [exit_code], lines: true}
  json/k8s-endpoints-v1: {scalars: [addresses]}
  json/k8s-pod-list-v1: {lines: true}
  json/k8s-resources-v1: {lines: true}
  text/k8s-events-v1: {lines: true}
  text/pod-logs-v1: {lines: true}
  text/rollout-history-v1: {scalars: [revision_count]}
  text/hpa-v1: {scalars: [target_util, current_util, current_replicas, max_replicas], lines: true}
  # ---- network: ntc/{{device.platform}}/* （名字含模板，与 skill 内字面量一致）----
  ntc/{{device.platform}}/bgp-summary: {scalars: [state, prefixes]}
  ntc/{{device.platform}}/bgp-neighbor: {scalars: [state, admin_state]}
  ntc/{{device.platform}}/bgp-received: {rows: [prefix]}
  ntc/{{device.platform}}/ospf-neighbor: {scalars: [state]}
  ntc/{{device.platform}}/ping: {scalars: [loss_pct]}
  ntc/{{device.platform}}/traceroute: {scalars: [loss_pct], lists: {hops: [loss_pct]}}
  ntc/{{device.platform}}/interface: {scalars: [link_state, crc_errors, input_errors, output_drops, util, direction_in, direction_out, applied_acls], lists: {interfaces: [broadcast_pps, util]}}
  ntc/{{device.platform}}/transceiver: {scalars: [rx_power_dbm, tx_power_dbm, rx_power_low_threshold, tx_power_low_threshold]}
  ntc/{{device.platform}}/vlan: {rows: [vlan_id, name, status]}
  ntc/{{device.platform}}/trunk: {scalars: [], lists: {allowed_vlans: []}}
  ntc/{{device.platform}}/stp: {scalars: [inconsistent_ports, tcn_rate]}
  ntc/{{device.platform}}/acl: {scalars: [deny_hit_count], lists: {entries: [action, hits]}}
  # ---- middleware: mysql ----
  mysql/status-v1: {scalars: [max_query_time, slow_queries]}
  mysql/procstate-v1: {scalars: [waiting_lock, sending_data]}
  mysql/slave-status-v1: {scalars: [io_running, sql_running, seconds_behind]}
  mysql/repl-workers-v1: {scalars: [parallel_workers]}
  mysql/repl-error-v1: {scalars: [last_error_number]}
  mysql/conn-v1: {scalars: [connected, max_connections]}
  mysql/conn-sleep-v1: {scalars: [long_sleep, max_connections]}
  mysql/lockwait-v1: {scalars: [lock_waits]}
  mysql/blocker-v1: {scalars: [long_blocker]}
  # ---- middleware: redis ----
  redis/bigkeys-v1: {scalars: [max_bytes, max_elements]}
  redis/info-memory-v1: {scalars: [used_memory, maxmemory, evicted_keys_rate]}
  redis/config-v1: {scalars: [policy_is_noeviction]}
  redis/hotkeys-v1: {scalars: [top_key_ratio]}
  # ---- middleware: kafka ----
  kafka/group-describe-v1: {scalars: [total_lag, lag_growing]}
  kafka/group-members-v1: {scalars: [unassigned_partitions, member_count]}
  kafka/urp-v1: {scalars: [urp_count]}
  kafka/broker-count-v1: {scalars: [brokers_down]}
  # ---- aicomp: gpu ----
  gpu/xid-v1: {scalars: [xid_code, gpu_id], lines: true}
  gpu/ecc-v1: {scalars: [dbe_count, sbe_count, pending_retirement]}
  gpu/smi-count-v1: {scalars: [gpu_count, smi_error]}
  gpu/pcie-v1: {scalars: [pcie_gpu_count, fell_off_evidence]}
  gpu/smi-v1: {scalars: [temp, power_draw, power_limit, util, mem_used, mem_total]}
  gpu/util-v1: {scalars: [gpu_util, mem_used, mem_total]}
  gpu/dmon-v1: {scalars: [avg_util, util_saw_tooth]}
  # ---- aicomp: fabric ----
  fabric/ibstat-v1: {scalars: [link_up, rate_gbps, expected_rate, symbol_errors]}
  # ---- aicomp: collective ----
  collective/nccl-perf-v1: {scalars: [busbw_gbps, expected_busbw]}
  collective/nccl-transport-v1: {scalars: [using_tcp, using_ib]}
  collective/nccl-timeout-v1: {scalars: [nccl_timeout]}
  # ---- aicomp: training ----
  train/procstate-v1: {scalars: [in_dstate]}
  train/step-time-v1: {scalars: [max_step_ms, median_step_ms]}
  train/node-metrics-v1: {scalars: [gpu_clock_throttled, ib_rate_degraded, data_wait_ms, median_step_ms]}
  train/gpu-trace-v1: {scalars: [comm_time_pct, small_kernel_pct]}
  cgroup/cpu-stat-v1: {scalars: [nr_periods, nr_throttled, throttled_usec, throttle_ratio]}
  cgroup/cpu-max-v1: {scalars: [quota_cores]}
  dns/resolv-v1: {rows: [ns], scalars: [nameserver_count, has_timeout_opt, has_rotate, first_ns]}
  dns/dig-multi-v1: {rows: [ns, ok, ms], scalars: [dead_ns_count, slow_ns_count, probed]}
