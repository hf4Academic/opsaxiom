skill: skills/host/network-stack/dns-flaky/skill.yaml
scenario: server 都健康，查本地缓存层
expect_path: [read_resolv, probe_servers, check_resolved, done_check_resolved]
node_ctx:
  read_resolv:
    output: {nameserver_count: 1, has_timeout_opt: 1, has_rotate: 0, first_ns: "127.0.0.53"}
  probe_servers:
    output: {dead_ns_count: 0, slow_ns_count: 0, probed: 1}
  check_resolved:
    service_active: true
